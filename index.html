<title>Ebro Basket — Ale (SG)</title>
<style>
  :root{
    --bg:#0f1216; --ink:#f2ede4; --muted:#9a9284; --line:#2b3038;
    --card2:#20262f; --ball:#ff8b2c;
    --atk:#3d8bff; --drv:#c98bff; --pmk:#4ccf6f; --def:#e2483d; --fis:#e6b23a; --tst:#42c7d0;
    --love:#4ccf6f; --hate:#e2483d;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 50% -10%,#1a2130,#0f1216 60%);color:var(--ink);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px 14px;}
  .hint{color:var(--muted);font-size:12px;margin-bottom:14px;text-align:center}
  .hint b{color:var(--ink)}
  .card{width:384px;background:linear-gradient(180deg,#222834,#161b22);
    border:1px solid #333c47;border-radius:20px;padding:14px 14px 16px;position:relative;
    box-shadow:0 20px 50px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);}
  .role{position:absolute;top:12px;left:15px;font-size:30px;font-weight:900;letter-spacing:1px;color:#fff;
    text-shadow:0 2px 0 rgba(0,0,0,.35);z-index:4;line-height:1}
  .role small{display:block;font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--muted);margin-top:1px}
  .hero{display:grid;grid-template-columns:102px 1fr 102px;align-items:center;gap:2px;margin-top:2px}
  .nba{width:102px;text-align:center;cursor:pointer}
  .nbadisc{width:98px;height:98px;border-radius:50%;margin:0 auto;background-size:cover;background-repeat:no-repeat;
    background-position:50% 22%;border:2px solid var(--c);animation:pulse 1.9s ease-in-out infinite}
  .nba.love .nbadisc{--c:var(--love)} .nba.hate .nbadisc{--c:var(--hate)}
  @keyframes pulse{0%,100%{box-shadow:0 0 5px var(--c),0 0 0 1px rgba(0,0,0,.35)}50%{box-shadow:0 0 16px var(--c),0 0 0 1px rgba(0,0,0,.35)}}
  .nba .cap{font-size:11px;font-weight:800;letter-spacing:.03em;margin-top:6px;color:#d8cfbe}
  .nba.love .cap{color:var(--love)} .nba.hate .cap{color:var(--hate)}
  .nba .pw{font-size:11px;color:#efe7d8;line-height:1.22;margin-top:3px;font-weight:600}
  .nba .mag{font-size:10px;color:#6f7885;margin-top:2px}
  .figwrap{height:228px;display:flex;align-items:flex-end;justify-content:center;position:relative}
  .figart{max-height:228px;max-width:100%;object-fit:contain;filter:drop-shadow(0 10px 12px rgba(0,0,0,.55));
    animation:bob 3.6s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .powers{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
  .pcell{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:8px 10px;cursor:pointer;transition:.15s;position:relative}
  .pcell:hover{border-color:var(--ball)} .pcell.open{border-color:var(--ball)}
  .pcell .t{font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
  .pcell.good .t{color:var(--love)} .pcell.bad .t{color:var(--hate)}
  .pcell .nm{font-size:12.5px;color:#f2ece0;margin-top:2px;font-weight:700}
  .pcell .mag{position:absolute;top:7px;right:8px;font-size:10px;color:#6f7885}
  .cats{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
  .cat{background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:7px 3px 6px;text-align:center;cursor:pointer;transition:.15s}
  .cat:hover{border-color:var(--ball);transform:translateY(-2px)} .cat.open{border-color:var(--ball)}
  .cat .lab{font-size:9px;font-weight:800;color:var(--muted)}
  .cat .num{font-size:20px;font-weight:900;margin-top:1px}
  .cat .mag{font-size:9px;color:#6f7885}
  .c-atk{color:var(--atk)} .c-drv{color:var(--drv)} .c-pmk{color:var(--pmk)}
  .c-def{color:var(--def)} .c-fis{color:var(--fis)} .c-tst{color:var(--tst)}
  .detail{margin-top:8px;background:var(--card2);border:1px solid var(--line);border-radius:10px;
    padding:0 12px;max-height:0;overflow:hidden;transition:max-height .28s ease,padding .28s ease}
  .detail.show{max-height:360px;padding:11px 12px}
  .detail h4{margin:0 0 8px;font-size:12px}
  .detail p{margin:0;font-size:12px;line-height:1.45;color:#e7ded0}
  .srow{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:11px}
  .srow .n{width:118px;color:#cdc4b4;flex:none}
  .srow .bar{flex:1;height:6px;background:#12161c;border-radius:4px;overflow:hidden}
  .srow .bar>i{display:block;height:100%;border-radius:4px}
  .srow .v{width:22px;text-align:right;color:#fff;font-weight:700;flex:none}
  .desc{margin-top:12px;background:linear-gradient(180deg,#1c222b,#161b22);border:1px solid var(--line);border-radius:10px;padding:11px 13px}
  .desc .t{font-size:9px;font-weight:800;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
  .desc p{margin:5px 0 0;font-size:12px;line-height:1.45;color:#e7ded0}
  .desc p i{color:#c9d6ea}
</style>

const COLORS={ATT:'#3d8bff',DRV:'#c98bff',PLM:'#4ccf6f',DEF:'#e2483d',PHY:'#e6b23a',INT:'#42c7d0'};
const avg=o=>Math.round(Object.values(o).reduce((a,b)=>a+b,0)/Object.values(o).length);
function render(){
  const c=CARD; let cats='';
  for(const k of ['ATT','DRV','PLM','DEF','PHY','INT'])
    cats+=`<div class="cat" data-k="${k}" onclick="toggle('${k}')"><div class="lab ${c.stats[k].cls}">${k}</div><div class="num ${c.stats[k].cls}">${avg(c.stats[k].subs)}</div><div class="mag">🔍</div></div>`;
  document.getElementById('card').innerHTML=`
    <div class="role">${c.role}<small>${c.name.toUpperCase()}</small></div>
    <div class="hero">
      <div class="nba love" data-k="LOVE" onclick="toggle('LOVE')"><div class="nbadisc" style="background-image:url('${c.nbaLove.icon}')"></div>
        <div class="cap">${c.nbaLove.name}</div><div class="pw">${c.nbaLove.pwName}</div><div class="mag">🔍</div></div>
      <div class="figwrap"><img class="figart" src="${c.img}" alt="${c.name}"></div>
      <div class="nba hate" data-k="HATE" onclick="toggle('HATE')"><div class="nbadisc" style="background-image:url('${c.nbaHate.icon}')"></div>
        <div class="cap">${c.nbaHate.name}</div><div class="pw">${c.nbaHate.pwName}</div><div class="mag">🔍</div></div>
    </div>
    <div class="powers">
      <div class="pcell good" data-k="PW" onclick="toggle('PW')"><div class="t">⚡ Pregio</div><div class="nm">${c.power.t}</div><div class="mag">🔍</div></div>
      <div class="pcell bad" data-k="CN" onclick="toggle('CN')"><div class="t">☠ Difetto</div><div class="nm">${c.counter.t}</div><div class="mag">🔍</div></div>
    </div>
    <div class="cats">${cats}</div>
    <div class="detail" id="detail"></div>
    <div class="desc"><div class="t">Scouting report</div><p>${c.desc}</p></div>`;
}
let openK=null;
window.toggle=function(k){
  const d=document.getElementById('detail');
  document.querySelectorAll('[data-k]').forEach(e=>e.classList.toggle('open', e.dataset.k===k && openK!==k));
  if(openK===k){ d.classList.remove('show'); openK=null; return; }
  openK=k;
  if(CARD.stats[k]){
    const s=CARD.stats[k], col=COLORS[k]; let rows='';
    for(const [n,v] of Object.entries(s.subs))
      rows+=`<div class="srow"><span class="n">${n}</span><span class="bar"><i style="width:${v}%;background:${col}"></i></span><span class="v">${v}</span></div>`;
    d.innerHTML=`<h4 style="color:${col}">${s.label} — dettaglio</h4>${rows}`;
  } else {
    const map={PW:{t:CARD.power.t,d:CARD.power.d,c:'#4ccf6f'},CN:{t:CARD.counter.t,d:CARD.counter.d,c:'#e2483d'},
      LOVE:{t:CARD.nbaLove.name+' · '+CARD.nbaLove.pwName,d:CARD.nbaLove.detail,c:'#4ccf6f'},
      HATE:{t:CARD.nbaHate.name+' · '+CARD.nbaHate.pwName,d:CARD.nbaHate.detail,c:'#e2483d'}};
    const m=map[k]; d.innerHTML=`<h4 style="color:${m.c}">${m.t}</h4><p>${m.d}</p>`;
  }
  d.classList.add('show');
};
render();
